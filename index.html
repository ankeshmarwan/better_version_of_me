<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#eef2f7;
}

.header{
background:linear-gradient(90deg,#3b82f6,#6366f1);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.time{
font-size:14px;
margin-top:4px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.section{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
font-weight:bold;
}

input,select{
padding:12px;
border-radius:6px;
border:1px solid #ddd;
margin-top:6px;
margin-bottom:10px;
width:100%;
font-size:15px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:6px;
width:100%;
font-size:15px;
}

.save{background:#3b82f6;color:white;}
.clear{background:#f59e0b;color:white;}
.reset{background:#ef4444;color:white;}
.export{background:#10b981;color:white;}

button:hover{opacity:0.9;}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
margin-top:10px;
}

.card{
background:#f8fafc;
padding:14px;
border-radius:8px;
text-align:center;
}

.card h2{
margin:5px 0;
color:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
}

th{
background:#f1f5f9;
}

th,td{
border:1px solid #e2e8f0;
padding:8px;
text-align:center;
}

canvas{
margin-top:20px;
}

.error{
color:red;
font-size:14px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">
Self Improvement Dashboard
<div class="time" id="clock"></div>
</div>

<div class="container">

<div class="section">

<h3>Daily Entry</h3>

<div class="error" id="error"></div>

<label>Gym</label>
<select id="gym">
<option value="">Select</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Coding Problems</label>
<input id="problems" type="number">

<label>Money Spent ₹</label>
<input id="money" type="number">

<label>Cigarettes Smoked Today</label>
<input id="cigs" type="number" min="0">

<button class="save" onclick="saveData()">Save Entry</button>
<button class="clear" onclick="clearInputs()">Clear</button>
<button class="reset" onclick="resetData()">Reset All Data</button>
<button class="export" onclick="exportData()">Export Excel</button>

</div>

<div class="section">

<h3>Summary</h3>

<div class="summary">

<div class="card">
<p>Gym Days</p>
<h2 id="gymTotal">0</h2>
</div>

<div class="card">
<p>Coding Problems</p>
<h2 id="problemTotal">0</h2>
</div>

<div class="card">
<p>Total Cigarettes</p>
<h2 id="cigTotal">0</h2>
</div>

<div class="card">
<p>Smoke-Free Days</p>
<h2 id="smokeFree">0</h2>
</div>

<div class="card">
<p>Average / Day</p>
<h2 id="avgCigs">0</h2>
</div>

<div class="card">
<p>Total Money</p>
<h2 id="moneyTotal">0</h2>
</div>

</div>

</div>

<div class="section">

<h3>Expense Trend</h3>
<canvas id="expenseChart"></canvas>

</div>

<div class="section">

<h3>Daily Smoking Trend</h3>
<canvas id="smokingChart"></canvas>

</div>

<div class="section">

<h3>History</h3>

<table id="history">

<tr>
<th>Date</th>
<th>Gym</th>
<th>Problems</th>
<th>Money</th>
<th>Cigarettes</th>
</tr>

</table>

</div>

</div>

<script>

function updateClock(){

let now=new Date();

let time=now.toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'});
let date=now.toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata'});

document.getElementById("clock").innerText=date+" | "+time;

}

setInterval(updateClock,1000);
updateClock();

let today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});

let data=JSON.parse(localStorage.getItem("lifeTracker")) || [];

let expenseChart;
let smokingChart;

function saveData(){

let gym=document.getElementById("gym").value;
let problems=document.getElementById("problems").value;
let money=document.getElementById("money").value;
let cigs=document.getElementById("cigs").value;

let error=document.getElementById("error");

if(gym==="" || problems==="" || money==="" || cigs===""){
error.innerText="All fields required";
return;
}

error.innerText="";

data.push({
date:today,
gym:parseInt(gym) || 0,
problems:parseInt(problems) || 0,
money:parseInt(money) || 0,
cigs:parseInt(cigs) || 0
});

localStorage.setItem("lifeTracker",JSON.stringify(data));

render();
clearInputs();

}

function clearInputs(){
document.getElementById("gym").value="";
document.getElementById("problems").value="";
document.getElementById("money").value="";
document.getElementById("cigs").value="";
}

function resetData(){

if(!confirm("Delete all data?")) return;

data=[];
localStorage.clear();
render();

}

function render(){

let table=document.getElementById("history");

table.innerHTML=`
<tr>
<th>Date</th>
<th>Gym</th>
<th>Problems</th>
<th>Money</th>
<th>Cigarettes</th>
</tr>
`;

let gymTotal=0;
let problemTotal=0;
let moneyTotal=0;
let cigTotal=0;
let smokeFree=0;

let labels=[];
let expenseData=[];
let smokingData=[];

data.forEach(d=>{

let cig=parseInt(d.cigs) || 0;
let money=parseInt(d.money) || 0;
let problems=parseInt(d.problems) || 0;
let gym=parseInt(d.gym) || 0;

let row=table.insertRow();

row.insertCell(0).innerText=d.date;
row.insertCell(1).innerText=gym?"Yes":"No";
row.insertCell(2).innerText=problems;
row.insertCell(3).innerText=money;
row.insertCell(4).innerText=cig;

gymTotal+=gym;
problemTotal+=problems;
moneyTotal+=money;
cigTotal+=cig;

if(cig===0) smokeFree++;

labels.push(d.date);
expenseData.push(money);
smokingData.push(cig);

});

document.getElementById("gymTotal").innerText=gymTotal;
document.getElementById("problemTotal").innerText=problemTotal;
document.getElementById("moneyTotal").innerText=moneyTotal;
document.getElementById("cigTotal").innerText=cigTotal;
document.getElementById("smokeFree").innerText=smokeFree;

let avg=data.length ? (cigTotal/data.length).toFixed(2) : 0;
document.getElementById("avgCigs").innerText=avg;

drawExpense(labels,expenseData);
drawSmoking(labels,smokingData);

}

function drawExpense(labels,dataPoints){

if(expenseChart) expenseChart.destroy();

expenseChart=new Chart(document.getElementById("expenseChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Expense ₹",
data:dataPoints,
borderColor:"#ef4444",
backgroundColor:"rgba(239,68,68,0.1)",
fill:true,
tension:0.3
}]
}
});

}

function drawSmoking(labels,dataPoints){

if(smokingChart) smokingChart.destroy();

smokingChart=new Chart(document.getElementById("smokingChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Cigarettes",
data:dataPoints,
borderColor:"#6366f1",
backgroundColor:"rgba(99,102,241,0.1)",
fill:true,
tension:0.3
}]
}
});

}

function exportData(){

if(data.length===0){
alert("No data to export");
return;
}

let rows=data.map(d=>({
Date:d.date,
Gym:(parseInt(d.gym)||0)?"Yes":"No",
Coding_Problems:parseInt(d.problems)||0,
Money_Spent:parseInt(d.money)||0,
Cigarettes_Smoked:parseInt(d.cigs)||0
}));

let worksheet=XLSX.utils.json_to_sheet(rows);
let workbook=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook,worksheet,"Dashboard");

XLSX.writeFile(workbook,"life_dashboard.xlsx");

}

render();

</script>

</body>

</html>
