<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#eef2f7;
}

.header{
background:linear-gradient(90deg,#3b82f6,#6366f1);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.time{
font-size:14px;
margin-top:4px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.section{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
font-weight:bold;
}

input,select{
padding:12px;
border-radius:6px;
border:1px solid #ddd;
margin-top:6px;
margin-bottom:10px;
width:100%;
font-size:15px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:6px;
width:100%;
font-size:15px;
}

.save{
background:#3b82f6;
color:white;
}

.clear{
background:#f59e0b;
color:white;
}

.reset{
background:#ef4444;
color:white;
}

button:hover{
opacity:0.9;
}

.error{
color:red;
font-size:14px;
margin-bottom:10px;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
margin-top:10px;
}

.card{
background:#f8fafc;
padding:14px;
border-radius:8px;
text-align:center;
}

.card h2{
margin:5px 0;
color:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
}

th{
background:#f1f5f9;
}

th,td{
border:1px solid #e2e8f0;
padding:8px;
text-align:center;
}

canvas{
margin-top:20px;
width:100% !important;
height:auto !important;
}

</style>

</head>

<body>

<div class="header">
Self Improvement Dashboard
<div class="time" id="clock"></div>
</div>

<div class="container">

<div class="section">

<h3>Settings</h3>

<label>Monthly Salary ₹</label>
<input id="salaryInput" type="number" value="70000">

</div>

<div class="section">

<h3>Daily Entry</h3>

<div class="error" id="error"></div>

<label>Gym</label>
<select id="gym">
<option value="">Select</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Coding Problems</label>
<input id="problems" type="number">

<label>Money Spent ₹</label>
<input id="money" type="number">

<button class="save" onclick="saveData()">Save Entry</button>

<button class="clear" onclick="clearInputs()">Clear</button>

<button class="reset" onclick="resetData()">Reset All Data</button>

<button onclick="exportData()">Export Backup</button>

</div>

<div class="section">

<h3>Summary</h3>

<div class="summary">

<div class="card">
<p>Gym Days</p>
<h2 id="gymTotal">0</h2>
</div>

<div class="card">
<p>Coding Problems</p>
<h2 id="problemTotal">0</h2>
</div>

<div class="card">
<p>Total Money Spent</p>
<h2>₹<span id="moneyTotal">0</span></h2>
</div>

<div class="card">
<p>Estimated Savings</p>
<h2>₹<span id="savingTotal">0</span></h2>
</div>

</div>

</div>

<div class="section">

<h3>Expense Trend</h3>

<canvas id="expenseChart"></canvas>

</div>

<div class="section">

<h3>History</h3>

<table id="history">

<tr>
<th>Date</th>
<th>Gym</th>
<th>Problems</th>
<th>Money</th>
</tr>

</table>

</div>

</div>

<script>

function updateClock(){

let now=new Date();

let time=now.toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'});

let date=now.toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata'});

document.getElementById("clock").innerText=date+" | "+time;

}

setInterval(updateClock,1000);
updateClock();

let today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});

let data=JSON.parse(localStorage.getItem("lifeTracker"))||[];

let chart;

let savedSalary=localStorage.getItem("salary");

if(savedSalary){
document.getElementById("salaryInput").value=savedSalary;
}

document.getElementById("salaryInput").addEventListener("change",function(){

localStorage.setItem("salary",this.value);

render();

});

function saveData(){

let gym=document.getElementById("gym").value;
let problems=document.getElementById("problems").value;
let money=document.getElementById("money").value;

let error=document.getElementById("error");

if(gym==="" || problems==="" || money===""){
error.innerText="All fields are required.";
return;
}

error.innerText="";

data.push({
date:today,
gym:parseInt(gym),
problems:parseInt(problems),
money:parseInt(money)
});

localStorage.setItem("lifeTracker",JSON.stringify(data));

render();

clearInputs();

}

function clearInputs(){

document.getElementById("gym").value="";
document.getElementById("problems").value="";
document.getElementById("money").value="";
document.getElementById("error").innerText="";

}

function resetData(){

if(!confirm("This will delete all dashboard data. Continue?")) return;

data=[];

localStorage.clear();

document.getElementById("salaryInput").value=70000;

clearInputs();

render();

}

function render(){

let table=document.getElementById("history");

table.innerHTML=`
<tr>
<th>Date</th>
<th>Gym</th>
<th>Problems</th>
<th>Money</th>
</tr>
`;

let gymTotal=0;
let problemTotal=0;
let moneyTotal=0;

let labels=[];
let expenseData=[];

data.forEach(d=>{

let row=table.insertRow();

row.insertCell(0).innerText=d.date;
row.insertCell(1).innerText=d.gym?"Yes":"No";
row.insertCell(2).innerText=d.problems;
row.insertCell(3).innerText=d.money;

gymTotal+=d.gym;
problemTotal+=d.problems;
moneyTotal+=d.money;

labels.push(d.date);
expenseData.push(d.money);

});

document.getElementById("gymTotal").innerText=gymTotal;
document.getElementById("problemTotal").innerText=problemTotal;
document.getElementById("moneyTotal").innerText=moneyTotal;

let salary=parseInt(document.getElementById("salaryInput").value)||0;

let savings=salary-moneyTotal;

document.getElementById("savingTotal").innerText=savings;

drawChart(labels,expenseData);

}

function drawChart(labels,data){

if(chart){
chart.destroy();
}

let ctx=document.getElementById("expenseChart");

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Daily Expense ₹",
data:data,
borderColor:"#ef4444",
backgroundColor:"rgba(239,68,68,0.1)",
borderWidth:2,
fill:true,
tension:0.3
}]
}
});

}

function exportData(){

let dataStr=JSON.stringify(data);

let blob=new Blob([dataStr],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="tracker_backup.json";

a.click();

}

render();

</script>

</body>

</html>
