<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#eef2f7;
}

.header{
background:linear-gradient(90deg,#3b82f6,#6366f1);
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.time{
font-size:14px;
margin-top:4px;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.section{
background:white;
padding:18px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
font-weight:bold;
}

input,select{
padding:12px;
border-radius:6px;
border:1px solid #ddd;
margin-top:6px;
margin-bottom:10px;
width:100%;
font-size:15px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:6px;
width:100%;
font-size:15px;
}

.save{background:#3b82f6;color:white;}
.salary{background:#6366f1;color:white;}
.clear{background:#f59e0b;color:white;}
.reset{background:#ef4444;color:white;}
.export{background:#10b981;color:white;}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
margin-top:10px;
}

.card{
background:#f8fafc;
padding:14px;
border-radius:8px;
text-align:center;
}

.card h2{
margin:5px 0;
color:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
}

th{
background:#f1f5f9;
}

th,td{
border:1px solid #e2e8f0;
padding:8px;
text-align:center;
}

canvas{
margin-top:20px;
}

.error{
color:red;
font-size:14px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">
Self Improvement Dashboard
<div class="time" id="clock"></div>
</div>

<div class="container">

<div class="section">

<h3>Salary</h3>

<label>Monthly Salary ₹</label>
<input id="salaryInput" type="number">

<button class="salary" onclick="saveSalary()">Save Salary</button>

</div>

<div class="section">

<h3>Daily Entry</h3>

<div class="error" id="error"></div>

<label>Gym</label>
<select id="gym">
<option value="">Select</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Coding Problems</label>
<input id="problems" type="number">

<label>Money Spent ₹</label>
<input id="money" type="number">

<label>Cigarettes Smoked Today</label>
<input id="cigs" type="number" min="0">

<button class="save" onclick="saveData()">Save Entry</button>
<button class="clear" onclick="clearInputs()">Clear</button>
<button class="reset" onclick="resetData()">Reset All Data</button>
<button class="export" onclick="exportData()">Export Excel</button>

</div>

<div class="section">

<h3>Summary</h3>

<div class="summary">

<div class="card"><p>Gym Days</p><h2 id="gymTotal">0</h2></div>
<div class="card"><p>Coding Problems</p><h2 id="problemTotal">0</h2></div>
<div class="card"><p>Total Cigarettes</p><h2 id="cigTotal">0</h2></div>
<div class="card"><p>Smoke-Free Days</p><h2 id="smokeFree">0</h2></div>
<div class="card"><p>Average / Day</p><h2 id="avgCigs">0</h2></div>
<div class="card"><p>Total Money</p><h2 id="moneyTotal">0</h2></div>
<div class="card"><p>Estimated Savings</p><h2 id="savingTotal">0</h2></div>

</div>

</div>

<div class="section">
<h3>Expense Trend</h3>
<canvas id="expenseChart"></canvas>
</div>

<div class="section">
<h3>Smoking Trend</h3>
<canvas id="smokingChart"></canvas>
</div>

<div class="section">

<h3>History</h3>

<table id="history">
<tr>
<th>Date</th>
<th>Gym</th>
<th>Problems</th>
<th>Money</th>
<th>Cigarettes</th>
</tr>
</table>

</div>

</div>

<script>

function updateClock(){

let now=new Date();
let time=now.toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'});
let date=now.toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata'});

document.getElementById("clock").innerText=date+" | "+time;

}

setInterval(updateClock,1000);
updateClock();

let data=JSON.parse(localStorage.getItem("lifeTracker"))||[];

let expenseChart;
let smokingChart;

function saveSalary(){

let salary=document.getElementById("salaryInput").value;

localStorage.setItem("salary",salary);

render();

}

function saveData(){

let today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});

let gym=document.getElementById("gym").value;
let problems=parseInt(document.getElementById("problems").value)||0;
let money=parseInt(document.getElementById("money").value)||0;
let cigs=parseInt(document.getElementById("cigs").value)||0;

let error=document.getElementById("error");

if(gym===""){
error.innerText="Gym field required";
return;
}

error.innerText="";

let existing=data.find(d=>d.date===today);

if(existing){

existing.problems+=problems;
existing.money+=money;
existing.cigs+=cigs;

if(gym==="1") existing.gym=1;

}else{

data.push({
date:today,
gym:parseInt(gym),
problems:problems,
money:money,
cigs:cigs
});

}

localStorage.setItem("lifeTracker",JSON.stringify(data));

render();
clearInputs();

}

function clearInputs(){

document.getElementById("gym").value="";
document.getElementById("problems").value="";
document.getElementById("money").value="";
document.getElementById("cigs").value="";

}

function resetData(){

if(!confirm("Delete all data?")) return;

data=[];
localStorage.clear();

render();

}

function render(){

let table=document.getElementById("history");

table.innerHTML=`
<tr>
<th>Date</th>
<th>Gym</th>
<th>Problems</th>
<th>Money</th>
<th>Cigarettes</th>
</tr>
`;

let gymTotal=0;
let problemTotal=0;
let moneyTotal=0;
let cigTotal=0;
let smokeFree=0;

let labels=[];
let expenseData=[];
let smokingData=[];

data.forEach(d=>{

let row=table.insertRow();

row.insertCell(0).innerText=d.date;
row.insertCell(1).innerText=d.gym?"Yes":"No";
row.insertCell(2).innerText=d.problems;
row.insertCell(3).innerText=d.money;
row.insertCell(4).innerText=d.cigs;

gymTotal+=d.gym;
problemTotal+=d.problems;
moneyTotal+=d.money;
cigTotal+=d.cigs;

if(d.cigs===0) smokeFree++;

labels.push(d.date);
expenseData.push(d.money);
smokingData.push(d.cigs);

});

document.getElementById("gymTotal").innerText=gymTotal;
document.getElementById("problemTotal").innerText=problemTotal;
document.getElementById("moneyTotal").innerText=moneyTotal;
document.getElementById("cigTotal").innerText=cigTotal;
document.getElementById("smokeFree").innerText=smokeFree;

let avg=data.length?(cigTotal/data.length).toFixed(2):0;
document.getElementById("avgCigs").innerText=avg;

let salary=parseInt(localStorage.getItem("salary"))||0;

document.getElementById("savingTotal").innerText=salary-moneyTotal;

drawCharts(labels,expenseData,smokingData);

}

function drawCharts(labels,expenses,smokes){

if(expenseChart)expenseChart.destroy();
if(smokingChart)smokingChart.destroy();

expenseChart=new Chart(document.getElementById("expenseChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Expense ₹",data:expenses,borderColor:"red"}]}
});

smokingChart=new Chart(document.getElementById("smokingChart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Cigarettes",data:smokes,borderColor:"blue"}]}
});

}

function exportData(){

let rows=data.map(d=>({
Date:d.date,
Gym:d.gym?"Yes":"No",
Coding_Problems:d.problems,
Money_Spent:d.money,
Cigarettes:d.cigs
}));

let sheet=XLSX.utils.json_to_sheet(rows);
let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,sheet,"Dashboard");

XLSX.writeFile(wb,"life_dashboard.xlsx");

}

render();

</script>

</body>

</html>
